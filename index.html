<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Apps — 日常のイライラを、そっと解消する</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; background: #0f0f1a; color: #e0e0e0; }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 60px 24px 48px;
      text-align: center;
      border-bottom: 1px solid rgba(224,160,48,0.2);
    }
    header h1 { font-size: 2.4rem; color: #E0A030; letter-spacing: 4px; margin-bottom: 12px; }
    header p { color: #aaa; font-size: 1rem; line-height: 1.7; }

    .apps {
      max-width: 800px;
      margin: 48px auto;
      padding: 0 24px;
    }
    .apps h2 { color: #E0C97F; font-size: 1rem; letter-spacing: 3px; margin-bottom: 24px; text-transform: uppercase; }

    .app-card {
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.2s;
    }
    .app-card:hover { border-color: rgba(224,160,48,0.4); background: rgba(224,160,48,0.05); }

    .app-icon {
      width: 72px; height: 72px;
      border-radius: 16px;
      background: linear-gradient(135deg, #1a1a2e, #2a2a4e);
      border: 1px solid rgba(224,160,48,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
    }
    .app-info h3 { color: #fff; font-size: 1.1rem; margin-bottom: 4px; }
    .app-info p { color: #888; font-size: 0.85rem; line-height: 1.6; }
    .app-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      background: rgba(224,160,48,0.15);
      color: #E0A030;
      border: 1px solid rgba(224,160,48,0.3);
    }

    footer {
      text-align: center;
      padding: 48px 24px;
      border-top: 1px solid rgba(255,255,255,0.06);
      color: #555;
      font-size: 0.8rem;
    }
    footer a { color: #888; text-decoration: none; margin: 0 12px; }
    footer a:hover { color: #E0A030; }
  </style>
</head>
<body>

<header>
  <h1>Ease Apps</h1>
  <p>日常のちょっとしたイライラを、そっと解消する。<br>シンプルで使いやすいアプリをお届けします。</p>
</header>

<main class="apps">
  <h2>Apps</h2>

  <a class="app-card" href="./minmo/">
    <div class="app-icon">🐾</div>
    <div class="app-info">
      <h3>Minmo</h3>
      <p>スマートフォンを見守りカメラに変えるアプリ。動体検知でLINEに通知します。</p>
      <span class="app-badge">Android</span>
    </div>
  </a>

  <!-- 今後のアプリはここに追加 -->

</main>

<footer>
  <p>
    <a href="./privacy-policy.html">プライバシーポリシー</a>
    <a href="./terms.html">利用規約</a>
  </p>
  <p style="margin-top:16px;">&copy; 2026 Ease Apps. All rights reserved.</p>
</footer>

</body>
</html>
